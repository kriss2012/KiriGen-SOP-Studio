version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kirigen
      POSTGRES_PASSWORD: kirigen
      POSTGRES_DB: kirigen_teamsop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://kirigen:kirigen@postgres:5432/kirigen_teamsop?schema=public
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"

  web:
    build:
      context: ../
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    env_file: ../.env
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
