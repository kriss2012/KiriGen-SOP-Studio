name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kirigen
          POSTGRES_PASSWORD: kirigen
          POSTGRES_DB: kirigen_teamsop_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://kirigen:kirigen@localhost:5432/kirigen_teamsop_test?schema=public
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec prisma migrate deploy --schema=prisma/schema.prisma

      - run: pnpm lint

      - run: pnpm build

      - run: pnpm test
